# Vercel KB pattern: link → pull → build → deploy --prebuilt (avoids rootDirectory / path doubling).
# Secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID_FRONTEND

name: Deploy frontend

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

concurrency:
  group: deploy-frontend-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}

jobs:
  deploy:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Link Vercel project
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: >-
          npx vercel@latest link --yes
          --token="$VERCEL_TOKEN"
          --scope="$VERCEL_ORG_ID"
          --project="$VERCEL_PROJECT_ID"

      - name: Pull Vercel environment
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          ENV=preview
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV=production
          fi
          npx vercel@latest pull --yes --environment="$ENV" --token="$VERCEL_TOKEN"

      # Pull writes rootDirectory: frontend (for Git clones). CI cwd is already frontend/ — drop it
      # or vercel build uses .../frontend/frontend (missing) → spawn ENOENT.
      - name: Normalize monorepo root for CI build
        working-directory: frontend
        run: |
          node <<'NODE'
          const fs = require("fs");
          const p = ".vercel/project.json";
          if (!fs.existsSync(p)) process.exit(0);
          const j = JSON.parse(fs.readFileSync(p, "utf8"));
          j.settings = j.settings || {};
          delete j.settings.rootDirectory;
          fs.writeFileSync(p, JSON.stringify(j, null, 2) + "\n");
          NODE

      - name: Build
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            npx vercel@latest build --prod --token="$VERCEL_TOKEN"
          else
            npx vercel@latest build --token="$VERCEL_TOKEN"
          fi

      - name: Deploy prebuilt
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            npx vercel@latest deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN"
          else
            npx vercel@latest deploy --prebuilt --yes --token="$VERCEL_TOKEN"
          fi

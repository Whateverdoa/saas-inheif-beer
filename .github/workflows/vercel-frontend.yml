# Preview on PR, production on push to main — deploy only the frontend/ tree (monorepo).
# Matches Vercel dashboard: project "frontend", root = frontend/
#
# GitHub → Settings → Actions → Variables: VERCEL_ACTIONS_DEPLOY = true
# Secrets: VERCEL_TOKEN, VERCEL_ORG_ID (team_…), VERCEL_PROJECT_ID_FRONTEND (prj_…)

name: Vercel — frontend

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/vercel-frontend.yml"
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/vercel-frontend.yml"

concurrency:
  group: vercel-frontend-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      vars.VERCEL_ACTIONS_DEPLOY == 'true' &&
      (github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Project dashboard has Root Directory = "frontend". Do NOT run `vercel deploy frontend`
      # from repo root — Vercel resolves that to …/frontend/frontend (missing). Use cwd + deploy .
      - name: Deploy to Vercel
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            npx --yes vercel@latest deploy . --token="$VERCEL_TOKEN" --yes --prod
          else
            npx --yes vercel@latest deploy . --token="$VERCEL_TOKEN" --yes
          fi

# Deploy Next.js (frontend/) to Vercel: preview on PRs, production on push to main.
#
# Enable: GitHub repo → Settings → Secrets and variables → Actions → Variables:
#   VERCEL_ACTIONS_DEPLOY = true
# Secrets (required when enabled):
#   VERCEL_TOKEN — https://vercel.com/account/tokens
#   VERCEL_ORG_ID — team id (team_...) under Vercel team settings
#   VERCEL_PROJECT_ID_FRONTEND — project id (prj_...) for the "frontend" Vercel project
#
# If the Vercel Git integration already deploys this project on every push, you may get
# duplicate builds; then leave VERCEL_ACTIONS_DEPLOY unset and rely on Vercel only.

name: Vercel — frontend

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/vercel-frontend.yml"
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/vercel-frontend.yml"

concurrency:
  group: vercel-frontend-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    # Opt-in: avoids failing CI when secrets are not configured.
    if: >-
      vars.VERCEL_ACTIONS_DEPLOY == 'true' &&
      (github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}
          working-directory: frontend
          github-token: ${{ secrets.GITHUB_TOKEN }}
          prod: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
